name: Build DeadFace

on:
  push:
    branches: ["main"]
    tags:
      - v*
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: build-deadface-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            label: linux
          - os: windows-2022
            label: windows
          - os: macos-latest
            label: macos

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install --no-cache-dir "pyinstaller==5.13.0"
          pip install --no-cache-dir -r Dead_Marks/requirements.txt
        shell: bash

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean DeadFace.spec

      - name: Package zip (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          cd dist
          zip -r DeadFace_${{ matrix.label }}.zip DeadFace/

      - name: Package zip (Windows)
        if: runner.os == 'Windows'
        run: |
          powershell -Command "Compress-Archive -Path 'dist/DeadFace/*' -DestinationPath 'dist/DeadFace_${{ matrix.label }}.zip'"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeadFace_${{ matrix.label }}
          path: dist/DeadFace_${{ matrix.label }}.zip
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
